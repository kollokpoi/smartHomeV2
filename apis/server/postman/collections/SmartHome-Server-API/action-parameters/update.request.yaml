$kind: http-request
name: 'update parameter by :id'
method: PUT
url: '{{base_url}}/action-parameters/:id'
order: 4200
pathVariables:
  - key: id
    value: '1'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "key": "temperature",
      "value": 24
    }
